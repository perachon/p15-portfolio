<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="260" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">Latence API /predict — résumé</title>
  <desc id="desc">Visualisation simple de la latence observée sur 42 requêtes: médiane 0,92 ms, moyenne 262,70 ms, maximum 2599,65 ms.</desc>

  <style>
    .bg{fill:#111827;stroke:rgba(229,231,235,.15);stroke-width:1}
    .grid{stroke:rgba(229,231,235,.10);stroke-width:1}
    .txt{fill:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,Arial;font-size:14px}
    .muted{fill:#9ca3af}
    .bar{fill:rgba(147,197,253,.16);stroke:rgba(147,197,253,.55);stroke-width:1}
    .tick{stroke:rgba(229,231,235,.22);stroke-width:1}
    .marker{stroke:rgba(34,197,94,.60);stroke-width:2}
    .marker2{stroke:rgba(147,197,253,.85);stroke-width:2}
    .marker3{stroke:rgba(239,68,68,.75);stroke-width:2}
    .cap{fill:#9ca3af;font-size:13px}
  </style>

  <rect x="12" y="12" width="956" height="236" rx="14" class="bg" />

  <!-- Plot area -->
  <g transform="translate(52,58)">
    <text class="txt" x="0" y="-20">Latence observée (42 requêtes) — échelle logarithmique (ms)</text>

    <!-- grid lines -->
    <line class="grid" x1="0" y1="0" x2="880" y2="0" />
    <line class="grid" x1="0" y1="120" x2="880" y2="120" />
    <line class="grid" x1="0" y1="160" x2="880" y2="160" />

    <!-- axis baseline -->
    <rect x="0" y="40" width="880" height="80" class="bar" rx="10" />

    <!-- log scale positions (ms) over range [0.1, 3000] -->
    <!-- x = (log10(v)-log10(0.1)) / (log10(3000)-log10(0.1)) * 880 -->

    <!-- median 0.92 ms -->
    <line class="marker" x1="263.2" y1="34" x2="263.2" y2="126" />
    <text class="txt" x="263.2" y="150" text-anchor="middle">médiane</text>
    <text class="txt muted" x="263.2" y="170" text-anchor="middle">0,92 ms</text>

    <!-- mean 262.70 ms -->
    <line class="marker2" x1="681.7" y1="34" x2="681.7" y2="126" />
    <text class="txt" x="681.7" y="150" text-anchor="middle">moyenne</text>
    <text class="txt muted" x="681.7" y="170" text-anchor="middle">262,70 ms</text>

    <!-- max 2599.65 ms -->
    <line class="marker3" x1="865.3" y1="34" x2="865.3" y2="126" />
    <text class="txt" x="865.3" y="150" text-anchor="middle">max</text>
    <text class="txt muted" x="865.3" y="170" text-anchor="middle">2599,65 ms</text>

    <!-- ticks -->
    <g>
      <line class="tick" x1="0" y1="126" x2="0" y2="134" />
      <text class="txt muted" x="0" y="156" text-anchor="start">0,1</text>

      <line class="tick" x1="190.4" y1="126" x2="190.4" y2="134" />
      <text class="txt muted" x="190.4" y="156" text-anchor="middle">1</text>

      <line class="tick" x1="380.8" y1="126" x2="380.8" y2="134" />
      <text class="txt muted" x="380.8" y="156" text-anchor="middle">10</text>

      <line class="tick" x1="571.2" y1="126" x2="571.2" y2="134" />
      <text class="txt muted" x="571.2" y="156" text-anchor="middle">100</text>

      <line class="tick" x1="761.6" y1="126" x2="761.6" y2="134" />
      <text class="txt muted" x="761.6" y="156" text-anchor="middle">1000</text>

      <line class="tick" x1="880" y1="126" x2="880" y2="134" />
      <text class="txt muted" x="880" y="156" text-anchor="end">3000</text>

      <text class="cap" x="0" y="196">Lecture: la médiane est très basse, mais un outlier (cold start) tire la moyenne et le max.</text>
    </g>
  </g>
</svg>
